name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # O 'master', según tu rama principal

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      # 🛠️ PASO NUEVO: Instalar pnpm en el servidor de GitHub
      - name: Instalar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9 # Puedes especificar la versión que usas localmente

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm' # 🛠️ Cambiado a pnpm para usar su caché

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile # Equivalente estricto a npm ci

      - name: Construir la aplicación (Build)
        run: pnpm build

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: Subir el artefacto de producción
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4